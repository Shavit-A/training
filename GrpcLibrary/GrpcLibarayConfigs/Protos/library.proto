syntax = "proto3";

option csharp_namespace = "GrpcLibraryConfigs";

import "google/protobuf/empty.proto";

package library;

service Library {
  rpc AddBook (AddBookRequest) returns (Response);
  rpc AddReviewToBook (AddReviewRequest) returns (Response);
  rpc RemoveBook (RemoveBookRequest) returns (Response);
  rpc BulkAddBooks (stream AddBookRequest) returns (Response);
  rpc WatchBooks (google.protobuf.Empty) returns (stream Response);
}

message AddBookRequest {
  string title = 1;
  string author = 2;
  uint32 publication_date = 3;
}

message Response{
	bool success = 1;
	string message = 2;
	uint32 book_id = 3;
}

message AddReviewRequest {
  uint32 book_id = 1;
  string review_text = 2;
}

message RemoveBookRequest {
  uint32 book_id = 1;
}