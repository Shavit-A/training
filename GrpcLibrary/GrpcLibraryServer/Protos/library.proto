syntax = "proto3";

option csharp_namespace = "GrpcLibraryServer";

package library;

service Library {
  rpc AddBook (Book) returns (AddBookResponse);
}

message Book {
  int32 id = 1;
  string title = 2;
  string author = 3;
  uint32 publication_date = 4;
}

message AddBookResponse{
	bool success = 1;
	string message = 2;
}

message Review {
  string review_text = 1;
}